name: Check Reservations

on:
  schedule:
    - cron: '0 * * * *'   # every hour at :00
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
        default: "2026-07-07"
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
        default: "2026-07-10"

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium
        run: playwright install --with-deps chromium

      - name: Run availability check
        run: |
          python3 check_reservations.py \
            --start "${{ inputs.start_date || '2026-07-07' }}" \
            --end   "${{ inputs.end_date   || '2026-07-10' }}" \
            --comment-file comment.md \
            --debug-screenshots

      - name: Post results to issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Count available slots
          SLOTS=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('reservations.json'))
              print(len(d.get('slots', [])))
          except Exception:
              print(0)
          ")

          # Scheduled runs: only post when slots found.
          # Manual runs: always post (useful for testing).
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" != "workflow_dispatch" ] && [ "$SLOTS" -eq 0 ]; then
            echo "No availability found — skipping issue comment for scheduled run."
            exit 0
          fi

          REPO="${{ github.repository }}"
          NUM=$(gh issue list \
            --repo "$REPO" \
            --search "Pizza Marumo Reservation Results in:title" \
            --state open --json number --jq '.[0].number // empty')
          if [ -z "$NUM" ]; then
            URL=$(gh issue create \
              --repo "$REPO" \
              --title "Pizza Marumo - Reservation Results" \
              --body "Availability check results are posted as comments below.")
            NUM=$(echo "$URL" | grep -o '[0-9]*$')
            echo "Created tracking issue #$NUM"
          else
            echo "Using existing issue #$NUM"
          fi

          if [ "$SLOTS" -gt 0 ]; then
            # Prepend @mention so GitHub emails the repo owner
            {
              printf '@%s — 🍕 availability found!\n\n' "${{ github.repository_owner }}"
              cat comment.md
            } > notify.md
            gh issue comment "$NUM" --repo "$REPO" --body-file notify.md
          else
            gh issue comment "$NUM" --repo "$REPO" --body-file comment.md
          fi

      - name: Post debug info if no times found
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARIES=$(ls debug/*_summary.md 2>/dev/null || true)
          if [ -n "$SUMMARIES" ]; then
            REPO="${{ github.repository }}"
            NUM=$(gh issue list \
              --repo "$REPO" \
              --search "Pizza Marumo Reservation Results in:title" \
              --state open --json number --jq '.[0].number // empty')
            if [ -n "$NUM" ]; then
              {
                echo "## 🔍 Debug — page state when no times were found"
                echo ""
                for f in $SUMMARIES; do
                  DATE=$(basename "$f" _summary.md)
                  echo "### $DATE"
                  echo ""
                  cat "$f"
                  echo ""
                  echo "---"
                  echo ""
                done
              } > debug_comment.md
              gh issue comment "$NUM" --repo "$REPO" --body-file debug_comment.md
            fi
          fi
